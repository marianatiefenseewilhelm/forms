  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

pescale, extracted from the \"Go Flow\n   * Design System Typescale\" collection (97 variables) + the \"Go Flow Design\n   * System Font Theme\" collection (file LS1yOsOQqbFFpG4c8T2kQO, single\n   * \"Mode 1\"). Each role in Figma is authored as separate sub-property\n   * variables (fontSize / lineHeight / letterSpacing / Weight /\n   * Weight-emphasized / Font); those are preserved 1:1 here. The per-role\n   * \"Font\" alias resolves to the single GoFlow family for every role, so it is\n   * collapsed to one --type-font-family token rather than repeated 18×. Weights\n   * alias the ref/* font-weight primitives, mirroring the Figma alias chain.\n   * Sizes, line-heights and tracking are absolute px (Figma authors tracking in\n   * px at the role's font size). @font-face for the Lexend files is declared at\n   * the top of this file.\n   * ========================================================================== */\n\n  /* shared family — every typescale role's Font resolves to Font/Family/GoFlow */\n  --type-font-family: var(--ref-font-family-goflow);\n\n  /* type — display (largest; hero / marketing moments, weight Regular) */\n  --type-display-large-font-size: 57px;\n  --type-display-large-line-height: 64px;\n  --type-display-large-letter-spacing: -0.25px;\n  --type-display-large-weight: var(--ref-font-weight-regular);\n\n  --type-display-medium-font-size: 45px;\n  --type-display-medium-line-height: 52px;\n  --type-display-medium-letter-spacing: 0px;\n  --type-display-medium-weight: var(--ref-font-weight-regular);\n\n  --type-display-small-font-size: 36px;\n  --type-display-small-line-height: 44px;\n  --type-display-small-letter-spacing: 0px;\n  --type-display-small-weight: var(--ref-font-weight-regular);\n\n  /* type — headline (weight Regular). Figma defines NO tracking variable for\n   * headline roles, so no letter-spacing token is emitted; consumers inherit\n   * the CSS default (normal), which matches MD3 headline tracking of 0. */\n  --type-headline-large ); /* @kind other */\n\n  --ease-standard: cubic-bezier(0.2, 0, 0, 1); /* @kind other */\n  --ease-emphasized: cubic-bezier(0.3, 0, 0.8, 0.15); /* @kind other */\n  --ease-decelerate: cubic-bezier(0, 0, 0, 1); /* @kind other */\n}\n\n/* ============================================================================\n * Dark theme overrides (if applicable)\n * Locked decision: this design system supports light/dark mode switching\n * with mode-specific values at the system token layer (sys/primary etc.).\n * ============================================================================ */\n\n@media (prefers-color-scheme: dark) {\n  :root {\n    /* Round 2 (Jun 2026): sys/* color Dark-mode overrides. Only tokens whose\n     * Dark value differs from Light are listed. Fixed-family tokens and tokens\n     * identical across modes (--sys-primary-container, --sys-on-primary-container,\n     * --sys-tertiary-container, --sys-on-tertiary-container, --sys-scrim,\n     * --sys-shadow) are intentionally absent — they inherit their single\n     * :root value. */\n\n    /* sys color — primary family */\n    --sys-primary: #CEBDFF;\n    --sys-on-primary: #380095;\n\n    /* sys color — secondary family */\n    --sys-secondary: #CEBDFF;\n    --sys-on-secondary: #352369;\n    --sys-secondary-container: #4E3D83;\n    --sys-on-secondary-container: #C0ADFC;\n\n    /* sys color — tertiary family */\n    --sys-tertiary: #FFACEC;\n    --sys-on-tertiary: #5D0056;\n\n    /* sys color — error family */\n    --sys-error: #FFB4AB;\n    --sys-on-error: #690005;\n    --sys-error-container: #93000A;\n    --sys-on-error-container: #FFDAD6;\n\n    /* sys color — surface family */\n    --sys-surface: #14121B;\n    --sys-surface-dim: #14121B;\n    --sys-surface-bright: #3B3842;\n    --sys-surface-container-lowest: #0F0D16;\n    --sys-surface-container-low: #1D1A24;\n    --sys-surface-container: #211E28;\n    --sys-surface-container-high: #2B2832;\n    --sys-surface-container-highest: #36333D;\n    --sys-s face */\n    --state-layers-onSurface-opacity-0_08: rgba(230, 224, 238, 0.08);\n    --state-layers-onSurface-opacity-0_10: rgba(230, 224, 238, 0.10);\n    --state-layers-onSurface-opacity-0_16: rgba(230, 224, 238, 0.16);\n\n    /* state-layers — onSurfaceVariant */\n    --state-layers-onSurfaceVariant-opacity-0_08: rgba(203, 195, 215, 0.08);\n    --state-layers-onSurfaceVariant-opacity-0_10: rgba(203, 195, 215, 0.10);\n    --state-layers-onSurfaceVariant-opacity-0_16: rgba(203, 195, 215, 0.16);\n\n    /* state-layers — onTertiary */\n    --state-layers-onTertiary-opacity-0_08: rgba(93, 0, 86, 0.08);\n    --state-layers-onTertiary-opacity-0_10: rgba(93, 0, 86, 0.10);\n    --state-layers-onTertiary-opacity-0_16: rgba(93, 0, 86, 0.16);\n\n    /* state-layers — outline */\n    --state-layers-outline-opacity-0_08: rgba(148, 142, 161, 0.08);\n    --state-layers-outline-opacity-0_10: rgba(148, 142, 161, 0.10);\n    --state-layers-outline-opacity-0_16: rgba(148, 142, 161, 0.16);\n\n    /* state-layers — outlineVariant */\n    --state-layers-outlineVariant-opacity-0_08: rgba(73, 68, 85, 0.08);\n    --state-layers-outlineVariant-opacity-0_10: rgba(73, 68, 85, 0.10);\n    --state-layers-outlineVariant-opacity-0_16: rgba(73, 68, 85, 0.16);\n\n    /* state-layers — primary */\n    --state-layers-primary-opacity-0_08: rgba(206, 189, 255, 0.08);\n    --state-layers-primary-opacity-0_10: rgba(206, 189, 255, 0.10);\n    --state-layers-primary-opacity-0_16: rgba(206, 189, 255, 0.16);\n\n    /* state-layers — secondary */\n    --state-layers-secondary-opacity-0_08: rgba(206, 189, 255, 0.08);\n    --state-layers-secondary-opacity-0_10: rgba(206, 189, 255, 0.10);\n    --state-layers-secondary-opacity-0_16: rgba(206, 189, 255, 0.16);\n\n    /* state-layers — secondaryContainer */\n    --state-layers-secondaryContainer-opacity-0_08: rgba(78, 61, 131, 0.08);\n    --state-layers-secondaryContainer-opacity-0_10: rgba(78, 61, 131, 0.10);\n    --state-layers-secondaryContainer-opacity-0_16: rgba(78, 61, 131, 0.16);\n\n    /* state-layers — surface */\n    --state-layers-surface-opacity-0_08: rgba(20, 18, 27, 0.08);\n    --state-layers-surface-opacity-0_10: rgba(20, 18, 27, 0.10);\n    --state-layers-surface-opacity-0_16: rgba(20, 18, 27, 0.16);\n\n    /* state-layers — surfaceBright */\n    --state-layers-surfaceBright-opacity-0_08: rgba(59, 56, 66, 0.08);\n    --state-layers-surfaceBright-opacity-0_10: rgba(59, 56, 66, 0.10);\n    --state-layers-surfaceBright-opacity-0_16: rgba(59, 56, 66, 0.16);\n\n    /* state-layers — surfaceContainer */\n    --state-layers-surfaceContainer-opacity-0_08: rgba(33, 30, 40, 0.08);\n    --state-layers-surfaceContainer-opacity-0_10: rgba(33, 30, 40, 0.10);\n    --state-layers-surfaceContainer-opacity-0_16: rgba(33, 30, 40, 0.16);\n\n    /* state-layers — surfaceContainerHigh */\n    --state-layers-surfaceContainerHigh-opacity-0_08: rgba(43, 40, 50, 0.08);\n    --state-layers-surfaceContainerHigh-opacity-0_10: rgba(43, 40, 50, 0.10);\n    --state-layers-surfaceContainerHigh-opacity-0_16: rgba(43, 40, 50, 0.16);\n\n    /* state-layers — surfaceContainerHighest */\n    --state-layers-surfaceContainerHighest-opacity-0_08: rgba(54, 51, 61, 0.08);\n    --state-layers-surfaceContainerHighest-opacity-0_10: rgba(54, 51, 61, 0.10);\n    --state-layers-surfaceContainerHighest-opacity-0_16: rgba(54, 51, 61, 0.16);\n\n    /* state-layers — surfaceContainerLow */\n    --state-layers-surfaceContainerLow-opacity-0_08: rgba(29, 26, 36, 0.08);\n    --state-layers-surfaceContainerLow-opacity-0_10: rgba(29, 26, 36, 0.10);\n    --state-layers-surfaceContainerLow-opacity-0_16: rgba(29, 26, 36, 0.16);\n\n    /* state-layers — surfaceContainerLowest */\n    --state-layers-surfaceContainerLowest-opacity-0_08: rgba(15, 13, 22, 0.08);\n    --state-layers-surfaceContainerLowest-opacity-0_10: rgba(15, 13, 22, 0.10);\n    --state-layers-surfaceContainerLowest-opacity-0_16: rgba(15, 13, 22, 0.16);\n\n    /* state-layers — surfaceDim */\n    --state-layers-surfaceDim-opacity-0_08: rgba(20, 18, 27, 0.08);\n    --state-layers-surfaceDim-opacity-0_10: rgba(20, 18, 27, 0.10);\n    --state-layers-surfaceDim-opacity-0_16: rgba(20, 18, 27, 0.16);\n\n    /* state-layers — surfaceTint */\n    --state-layers-surfaceTint-opacity-0_08: rgba(206, 189, 255, 0.08);\n    --state-layers-surfaceTint-opacity-0_10: rgba(206, 189, 255, 0.10);\n    --state-layers-surfaceTint-opacity-0_16: rgba(206, 189, 255, 0.16);\n\n    /* state-layers — surfaceVariant */\n    --state-layers-surfaceVariant-opacity-0_08: rgba(73, 68, 85, 0.08);\n    --state-layers-surfaceVariant-opacity-0_10: rgba(73, 68, 85, 0.10);\n    --state-layers-surfaceVariant-opacity-0_16: rgba(73, 68, 85, 0.16);\n\n    /* state-layers — tertiary */\n    --state-layers-tertiary-opacity-0_08: rgba(255, 172, 236, 0.08);\n    --state-layers-tertiary-opacity-0_10: rgba(255, 172, 236, 0.10);\n    --state-layers-tertiary-opacity-0_16: rgba(255, 172, 236, 0.16);\n  }\n}\n\n/* ============================================================================\n * Notes for migration\n *\n * The existing token files in vendoo-design-system are:\n * - light.tokens.json (121 mode-switching tokens, 191 mode-invariant)\n * - dark.tokens.json\n *\n * Migration approach: convert the flat JSON structure to CSS custom\n * properties following the categorization above. Preserve the M3-style\n * flat layout where sys/primary tokens share the same path in both\n * files but carry mode-specific values.\n *\n * This file is a STARTER. Migration happens incrementally as Wave 1\n * components are implemented and reveal which tokens are actually needed\n * first. Avoid migrating all tokens speculatively — only what's used.\n * ============================================================================ */\n\n\n/* ============================================================================\n * ============================================================================\n * CONVENIENCE & SEMANTIC LAYER\n *\n * Folded in from the former colors_and_type.css (removed Jun 2026) so this is\n * now the SINGLE foundation file — link tokens.css and nothing else. Everything\n * below is DERIVED from the canonical sys/ref tokens above via var(), so it\n * cannot drift: tokens.css is the source of truth, and these aliases inherit\n * any value change (including the light/dark overrides) automatically.\n *\n * Provides: brand tokens, short hand-authoring aliases (--fg*, --radius-*,\n * --space-*, --size-*), the `font:`-shorthand --type-* roles, elevation shadow\n * geometry, state-layer opacities, semantic element defaults, and .t-* type\n * utility classes.\n * ============================================================================\n * ============================================================================ */\n\n:root {\n  /* --------------------------------------------------------------------\n   * BRAND\n   * The Vendoo mark is a 4-stop gradient (yellow → pink → blue → teal).\n   * Use it for the logo mark and rare brand moments only — never as a UI\n   * background. --vendoo-purple is the mode-invariant brand purple.\n   * -------------------------------------------------------------------- */\n  --vendoo-brand-gradient: linear-gradient(135deg, #FECB40 0%, #F7507C 31%, #4852E8 64%, #47CDAE 100%); /* @kind color */\n  --vendoo-purple: #4A00BF;\n\n  /* --------------------------------------------------------------------\n   * COLOR — convenience aliases (shorter, for hand-authoring HTML).\n   * These resolve through the sys/* roles, so they flip in dark mode.\n   * -------------------------------------------------------------------- */\n  --fg1: var(--sys-on-surface);              /* primary text */\n  --fg2: var(--sys-on-surface-variant);      /* secondary text / labels */\n  --fg3: var(--sys-outline);                 /* tertiary / placeholder text */\n  --bg: var(--sys-background);\n  --surface: var(--sys-surface-container-lowest);\n  --line: var(--sys-outline-variant);\n  --accent: var(--sys-primary);\n\n  /* Family alias — same resolved stack as --type-font-family. */\n  --font-sans: var(--ref-font-family-goflow);\n\n  /* --------------------------------------------------------------------\n   * TYPE — `font:`-shorthand roles, composed from the granular typescale\n   * tokens above. Tracking (letter-spacing) is NOT part of the CSS font\n   * shorthand; apply the matching --type-*-letter-spacing or a .t-* class\n   * when tracking matters. Base + -emphasized (weight-only) variants.\n   * -------------------------------------------------------------------- */\n\n  /* Display */\n  --type-display-large:  var(--type-display-large-weight)  var(--type-display-large-font-size)/var(--type-display-large-line-height)   var(--type-font-family);\n  --type-display-medium: var(--type-display-medium-weight) var(--type-display-medium-font-size)/var(--type-display-medium-line-height) var(--type-font-family);\n  --type-display-small:  var(--type-display-small-weight)  var(--type-display-small-font-size)/var(--type-display-small-line-height)   var(--type-font-family);\n\n  /* Headline */\n  --type-headline-large:  var(--type-headline-large-weight)  var(--type-headline-large-font-size)/var(--type-headline-large-line-height)   var(--type-font-family);\n  --type-headline-medium: var(--type-headline-medium-weight) var(--type-headline-medium-font-size)/var(--type-headline-medium-line-height) var(--type-font-family);\n  --type-headline-small:  var(--type-headline-small-weight)  var(--type-headline-small-font-size)/var(--type-headline-small-line-height)   var(--type-font-family);\n\n  /* Title (base Regular, -emphasized Medium) */\n  --type-title-large:  var(--type-title-large-weight)  var(--type-title-large-font-size)/var(--type-title-large-line-height)   var(--type-font-family);\n  --type-title-medium: var(--type-title-medium-weight) var(--type-title-medium-font-size)/var(--type-title-medium-line-height) var(--type-font-family);\n  --type-title-small:  var(--type-title-small-weight)  var(--type-title-small-font-size)/var(--type-title-small-line-height)   var(--type-font-family);\n  --type-title-large-emphasized:  var(--type-title-large-weight-emphasized)  var(--type-title-large-font-size)/var(--type-title-large-line-height)   var(--type-font-family);\n  --type-title-medium-emphasized: var(--type-title-medium-weight-emphasized) var(--type-title-medium-font-size)/var(--type-title-medium-line-height) var(--type-font-family);\n  --type-title-small-emphasized:  var(--type-title-small-weight-emphasized)  var(--type-title-small-font-size)/var(--type-title-small-line-height)   var(--type-font-family);\n\n  /* Body (base Regular, -emphasized Medium) */\n  --type-body-large:  var(--type-body-large-weight)  var(--type-body-large-font-size)/var(--type-body-large-line-height)   var(--type-font-family);\n  --type-body-medium: var(--type-body-medium-weight) var(--type-body-medium-font-size)/var(--type-body-medium-line-height) var(--type-font-family);\n  --type-body-small:  var(--type-body-small-weight)  var(--type-body-small-font-size)/var(--type-body-small-line-height)   var(--type-font-family);\n  --type-body-large-emphasized:  var(--type-body-large-weight-emphasized)  var(--type-body-large-font-size)/var(--type-body-large-line-height)   var(--type-font-family);\n  --type-body-medium-emphasized: var(--type-body-medium-weight-emphasized) var(--type-body-medium-font-size)/var(--type-body-medium-line-height) var(--type-font-family);\n  --type-body-small-emphasized:  var(--type-body-small-weight-emphasized)  var(--type-body-small-font-size)/var(--type-body-small-line-height)   var(--type-font-family);\n\n  /* Label (base Medium, -emphasized Semi-Bold) */\n  --type-label-large:  var(--type-label-large-weight)  var(--type-label-large-font-size)/var(--type-label-large-line-height)   var(--type-font-family);\n  --type-label-medium: var(--type-label-medium-weight) var(--type-label-medium-font-size)/var(--type-label-medium-line-height) var(--type-font-family);\n  --type-label-small:  var(--type-label-small-weight)  var(--type-label-small-font-size)/var(--type-label-small-line-height)   var(--type-font-family);\n  --type-label-large-emphasized:  var(--type-label-large-weight-emphasized)  var(--type-label-large-font-size)/var(--type-label-large-line-height)   var(--type-font-family);\n  --type-label-medium-emphasized: var(--type-label-medium-weight-emphasized) var(--type-label-medium-font-size)/var(--type-label-medium-line-height) var(--type-font-family);\n  --type-label-small-emphasized:  var(--type-label-small-weight-emphasized)  var(--type-label-small-font-size)/var(--type-label-small-line-height)   var(--type-font-family);\n\n  /* Utility/label */\n  --type-utility-label-medium-caps: var(--type-utility-label-medium-caps-weight) var(--type-utility-label-medium-caps-font-size)/var(--type-utility-label-medium-caps-line-height) var(--type-font-family);\n  --type-utility-label-medium:      var(--type-utility-label-medium-weight)      var(--type-utility-label-medium-font-size)/var(--type-utility-label-medium-line-height)           var(--type-font-family);\n  --type-utility-label-small:       var(--type-utility-label-small-weight)       var(--type-utility-label-small-font-size)/var(--type-utility-label-small-line-height)             var(--type-font-family);\n\n  /* --------------------------------------------------------------------\n   * SHAPE — corner-radius aliases → sys/* radii.\n   * Note: --radius-xl (24px) has no canonical sys token (the sys scale\n   * jumps 16 → 28); kept as a literal for back-compat.\n   * -------------------------------------------------------------------- */\n  --radius-none: var(--sys-radius-none);\n  --radius-xs:   var(--sys-radius-extra-small);   /* 4px  — buttons, inputs */\n  --radius-sm:   var(--sys-radius-small);         /* 8px  — chips, small controls */\n  --radius-md:   var(--sys-radius-medium);        /* 12px — fields, list rows */\n  --radius-lg:   var(--sys-radius-large);         /* 16px — cards */\n  --radius-xl:   24px;                            /* large surfaces, doc cards (no sys token) */\n  --radius-2xl:  var(--sys-radius-extra-large);   /* 28px — sheets, hero panels */\n  --radius-full: var(--sys-radius-full);          /* pills, FAB, avatars */\n  --border-default: var(--sys-border-default);\n  --border-strong:  var(--sys-border-strong);\n\n  /* --------------------------------------------------------------------\n   * SPACING — 4-based scale aliases → ref/* primitives + sys/* semantics.\n   * -------------------------------------------------------------------- */\n  --space-0:  var(--ref-space-0);\n  --space-2:  var(--ref-space-2);\n  --space-4:  var(--ref-space-4);\n  --space-8:  var(--ref-space-8);\n  --space-10: var(--ref-space-10);\n  --space-12: var(--ref-space-12);\n  --space-16: var(--ref-space-16);\n  --space-24: var(--ref-space-24);\n  --space-32: var(--ref-space-32);\n  --space-40: var(--ref-space-40);\n  --space-48: var(--ref-space-48);\n  --space-64: var(--ref-space-64);\n  --space-page-gutter:     var(--sys-space-page-gutter-medium);\n  --space-section-gap:     var(--sys-space-section-gap);\n  --space-group-gap:       var(--sys-space-group-gap);\n  --space-field-stack-gap: var(--sys-space-field-stack-gap);\n  --space-row-gap:         var(--sys-space-row-gap);\n  --space-inset-default:   var(--sys-space-inset-default);\n  --space-inset-panel:     var(--sys-space-inset-panel);\n\n  /* --------------------------------------------------------------------\n   * SIZING — control heights, icons, touch targets → sys/* sizes.\n   * -------------------------------------------------------------------- */\n  --size-control-compact: var(--sys-size-control-compact);\n  --size-control-default: var(--sys-size-control-default);   /* 48px — Small button height */\n  --size-control-large:   var(--sys-size-control-large);     /* 56px — Medium button height */\n  --size-touch-target:    var(--sys-size-touch-target-minimum);\n  --size-icon-small:      var(--sys-size-icon-small);\n  --size-icon-medium:     var(--sys-size-icon-medium);       /* icons inside Button / Field */\n  --size-icon-default:    var(--sys-size-icon-default);      /* IconButton icons */\n\n  /* --------------------------------------------------------------------\n   * ELEVATION — MD3 shadow geometry (web approximation). tokens.css only\n   * carries level INDICES (--sys-elevation-levelN); these resolved shadows\n   * are the canonical web geometry. Surfaces are mostly flat with a hairline\n   * outline; elevation is reserved for menus, dialogs, FAB, sticky footers.\n   * -------------------------------------------------------------------- */\n  --elev-1: 0 1px 2px rgba(0,0,0,0.15), 0 1px 3px 1px rgba(0,0,0,0.08);\n  --elev-2: 0 1px 2px rgba(0,0,0,0.15), 0 2px 6px 2px rgba(0,0,0,0.08);\n  --elev-3: 0 4px 8px 3px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.15);\n  --elev-4: 0 6px 10px 4px rgba(0,0,0,0.08), 0 2px 3px rgba(0,0,0,0.15);\n  --elev-5: 0 8px 12px 6px rgba(0,0,0,0.08), 0 4px 4px rgba(0,0,0,0.15);\n\n  /* --------------------------------------------------------------------\n   * STATE-LAYER opacities — convenience aliases → sys/* opacity tokens.\n   * -------------------------------------------------------------------- */\n  --state-hover:            var(--sys-opacity-state-layer-hover);\n  --state-focus:            var(--sys-opacity-state-layer-focus);\n  --state-pressed:          var(--sys-opacity-state-layer-pressed);\n  --state-disabled-content: var(--sys-opacity-disabled-content);\n}\n\n/* ============================================================================\n * SEMANTIC ELEMENT DEFAULTS\n * Apply Vendoo type + color to bare HTML so prototypes inherit the system.\n * ============================================================================ */\nbody {\n  font: var(--type-body-medium);\n  letter-spacing: 0.25px;\n  color: var(--fg1);\n  background: var(--bg);\n  -webkit-font-smoothing: antialia p:32px;align-items:stretch;\">\n      <div style=\"flex:1;background:#fff;border:1px solid #CBC3D7;border-radius:16px;padding:44px 44px 48px;\">\n        <div style=\"font-size:22px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#7A7486;margin-bottom:20px;\">Last presentation<\u002Fdiv>\n        <div style=\"font-size:40px;font-weight:500;line-height:1.2;margin-bottom:16px;\">The why<\u002Fdiv>\n        <p style=\"font-size:30px;font-weight:300;line-height:1.45;color:#494455;margin:0;\">The bigger-picture direction and the case for bringing the design system into the workflow.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"flex:1;background:#4A00BF;border-radius:16px;padding:44px 44px 48px;color:#fff;\">\n        <div style=\"font-size:22px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;color:#CEBDFF;margin-bottom:20px;\">This presentation<\u002Fdiv>\n        <div style=\"font-size:40px;font-weight:500;line-height:1.2;margin-bottom:16px;\">The how<\u002Fdiv>\n        <p style=\"font-size:30px;font-weight:300;line-height:1.45;color:#E8DDFF;margin:0;\">The practical workflow — what's already usable, and where this is heading next.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:30px;font-weight:300;line-height:1.4;color:#494455;margin:44px 0 0;\">Goal: show what you can use today, and where it goes from here.<\u002Fp>\n  <\u002Fsection>\n\n  <!-- 04 · Problem -->\n  <section data-label=\"Problem\" data-speaker-notes=\"The reason this matters. Knowledge is scattered, AI can drift, handoff is manual, and there's no shared source of truth.\" style=\"width:100%;height:100%;box-sizing:border-box;font-family:'Lexend',sans-serif;background:#FDF7FF;color:#1D1A24;padding:96px 110px 80px;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:32px;\">\n      <div style=\"width:44px;height:44px;border-radius:50%;background:#6231D8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;\">02<\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#494455;\">The problem<\u002Fdiv>\n    <\u002Fdiv>\n    <h2 style=\"font-size:64px;font-weight:500;line-height:1.08;letter-spacing:-0.01em;margin:0 0 24px;max-width:1400px;\">Design knowledge is scattered today<\u002Fh2>\n    <p style=\"font-size:32px;font-weight:300;line-height:1.4;color:#494455;margin:0 0 48px;max-width:1200px;\">It lives in many places, so it's hard to follow and easy to drift from.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:24px;\">\n      <div style=\"display:flex;gap:24px;align-items:flex-start;background:#fff;border:1px solid #CBC3D7;border-radius:16px;padding:32px 36px;\">\n        <span style=\"width:38px;height:38px;flex:none;background:#4A00BF;-webkit-mask:url(&quot;8a2b1d59-0fb6-47a9-a892-d96f049732f7&quot;) center/contain no-repeat;mask:url(&quot;8a2b1d59-0fb6-47a9-a892-d96f049732f7&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:400;line-height:1.35;margin:0;\">Knowledge is spread across files, docs, and components<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:24px;align-items:flex-start;background:#fff;border:1px solid #CBC3D7;border-radius:16px;padding:32px 36px;\">\n        <span style=\"width:38px;height:38px;flex:none;background:#4A00BF;-webkit-mask:url(&quot;d1907881-d64e-4f6c-9eaf-6ca25a238e75&quot;) center/contain no-repeat;mask:url(&quot;d1907881-d64e-4f6c-9eaf-6ca25a238e75&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:400;line-height:1.35;margin:0;\">AI can drift or invent patterns if it isn't guided<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:24px;align-items:flex-start;background:#fff;border:1px solid #CBC3D7;border-radius:16px;padding:32px 36px;\">\n        <span style=\"width:38px;height:38px;flex:none;background:#4A00BF;-webkit-mask:url(&quot;95f3b6f8-a8e0-4d16-8532-f2d76297be1f&quot;) center/contain no-repeat;mask:url(&quot;95f3b6f8-a8e0-4d16-8532-f2d76297be1f&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:400;line-height:1.35;margin:0;\">Handoff still depends on manual interpretation<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:24px;align-items:flex-start;background:#fff;border:1px solid #CBC3D7;border-radius:16px;padding:32px 36px;\">\n        <span style=\"width:38px;height:38px;flex:none;background:#4A00BF;-webkit-mask:url(&quot;43584440-13a5-450b-827b-f8f09ddc454e&quot;) center/contain no-repeat;mask:url(&quot;43584440-13a5-450b-827b-f8f09ddc454e&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:400;line-height:1.35;margin:0;\">Teams need one shared source of truth for UI decisions<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 · What changes -->\n  <section data-label=\"What changes\" data-speaker-notes=\"With Claude Design, the system context lives inside the workflow and can guide outputs. Explore without starting from scratch; easier to review against our standards.\" style=\"width:100%;height:100%;box-sizing:border-box;font-family:'Lexend',sans-serif;background:#FDF7FF;color:#1D1A24;padding:96px 110px 80px;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:32px;\">\n      <div style=\"width:44px;height:44px;border-radius:50%;background:#6231D8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;\">03<\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#494455;\">What changes<\u002Fdiv>\n    <\u002Fdiv>\n    <h2 style=\"font-size:64px;font-weight:500;line-height:1.08;letter-spacing:-0.01em;margin:0 0 52px;max-width:1400px;\">The system now lives inside the workflow<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:28px 56px;max-width:1560px;\">\n      <div style=\"display:flex;gap:22px;align-items:flex-start;\">\n        <span style=\"width:40px;height:40px;flex:none;margin-top:4px;background:#4A00BF;-webkit-mask:url(&quot;826e667e-f39c-428c-b043-79d4a534e843&quot;) center/contain no-repeat;mask:url(&quot;826e667e-f39c-428c-b043-79d4a534e843&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <div>\n          <div style=\"font-size:32px;font-weight:500;line-height:1.25;margin-bottom:8px;\">Context comes built in<\u002Fdiv>\n          <p style=\"font-size:27px;font-weight:300;line-height:1.4;color:#494455;margin:0;\">Design system context lives where the work happens.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start;\">\n        <span style=\"width:40px;height:40px;flex:none;margin-top:4px;background:#4A00BF;-webkit-mask:url(&quot;1702f5dd-220f-4fdb-8d0e-68eef5e0bdaf&quot;) center/contain no-repeat;mask:url(&quot;1702f5dd-220f-4fdb-8d0e-68eef5e0bdaf&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <div>\n          <div style=\"font-size:32px;font-weight:500;line-height:1.25;margin-bottom:8px;\">Outputs are guided<\u002Fdiv>\n          <p style=\"font-size:27px;font-weight:300;line-height:1.4;color:#494455;margin:0;\">Components, tokens, patterns, and rules shape what comes out.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:22px;align-items:flex-start;\">\n        <span style=\"width:40px;height:40px;flex:none;margin-top:4px;background:#4A00BF;-webkit-mask:url(&quot;dac4ee59-8fbd-4d07-8a93-2f8bd5192fa3&quot;) center/contain no-repeat;mask:url(&quot;dac4ee59-8fbd-4d07-8a93-2f8bd5192fa3&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <div>\n          <div style=\"font-size:32px;font-weight:500;line-height:1.25;margin-bottom:8px;\">No b e2-fc9c-4182-b6a5-12b922bda80a&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <div style=\"font-size:30px;font-weight:500;line-height:1.25;margin-bottom:12px;\">Usage has limits<\u002Fdiv>\n        <p style=\"font-size:27px;font-weight:300;line-height:1.4;color:#494455;margin:0;\">There are caps on usage — plan heavier tasks accordingly.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 12 · Tips -->\n  <section data-label=\"Tips\" data-speaker-notes=\"How to get good results. Be specific in plain language, make a list, frame things positively, reference components by markup, reference files, build from templates, and upload assets then reference by filename.\" style=\"width:100%;height:100%;box-sizing:border-box;font-family:'Lexend',sans-serif;background:#FDF7FF;color:#1D1A24;padding:96px 110px 80px;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:32px;\">\n      <div style=\"width:44px;height:44px;border-radius:50%;background:#6231D8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;\">09<\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#494455;\">Tips<\u002Fdiv>\n    <\u002Fdiv>\n    <h2 style=\"font-size:64px;font-weight:500;line-height:1.08;letter-spacing:-0.01em;margin:0 0 44px;max-width:1400px;\">How to get good results<\u002Fh2>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:20px 48px;max-width:1620px;\">\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n        <span style=\"width:34px;height:34px;flex:none;margin-top:3px;background:#4A00BF;-webkit-mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:300;line-height:1.35;margin:0;\">Use plain language, and be specific about what you want.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n        <span style=\"width:34px;height:34px;flex:none;margin-top:3px;background:#4A00BF;-webkit-mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:300;line-height:1.35;margin:0;\">Make a list of requirements, and frame them positively.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n        <span style=\"width:34px;height:34px;flex:none;margin-top:3px;background:#4A00BF;-webkit-mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:300;line-height:1.35;margin:0;\">Don't know a component's name? Describe it with markup.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n        <span style=\"width:34px;height:34px;flex:none;margin-top:3px;background:#4A00BF;-webkit-mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:300;line-height:1.35;margin:0;\">Reference other files when they give useful context.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n        <span style=\"width:34px;height:34px;flex:none;margin-top:3px;background:#4A00BF;-webkit-mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:300;line-height:1.35;margin:0;\">Build from templates rather than from a blank page.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:20px;align-items:flex-start;\">\n        <span style=\"width:34px;height:34px;flex:none;margin-top:3px;background:#4A00BF;-webkit-mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;mask:url(&quot;196f9b6b-96ff-4c5b-9b0e-24240ebc98e4&quot;) center/contain no-repeat;\"><\u002Fspan>\n        <p style=\"font-size:30px;font-weight:300;line-height:1.35;margin:0;\">Have assets? Upload them and reference each by filename.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 13 · Guardrails -->\n  <section data-label=\"Guardrails\" data-speaker-notes=\"Where Claude should stop. It shouldn't invent unresolved patterns, undefined decisions should be flagged, anything outside the system goes to design review, and Claude is a support tool — not the final decision-maker.\" style=\"width:100%;height:100%;box-sizing:border-box;font-family:'Lexend',sans-serif;background:#FDF7FF;color:#1D1A24;padding:96px 110px 80px;display:flex;flex-direction:column;\">\n    <div style=\"display:flex;align-items:center;gap:16px;margin-bottom:32px;\">\n      <div style=\"width:44px;height:44px;border-radius:50%;background:#6231D8;color:#fff;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;\">10<\u002Fdiv>\n      <div style=\"font-size:22px;font-weight:500;letter-spacing:0.14em;text-transform:uppercase;color:#494455;\">Guardrails<\u002Fdiv>\n    <\u002Fdiv>\n    <h2 style=\"font-size:64px;font-weight:500;line-height:1.08;letter-spacing:-0.01em;margin:0 0 48px;max-width:1400px;\">Where Claude should stop<\u002Fh2>\n    <div style=\"display:flex;flex-direction:column;gap:18px;max-width:1500px;\">\n      <div style=\"display:flex;gap:22px;align-items:center;background:#fff;border:1px solid #CBC3D7;border-radius:14px;padding:28px 34px;\">\n        <s
